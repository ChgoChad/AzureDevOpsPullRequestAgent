trigger: none

# Pull request triggers for Azure DevOps repos are configured via branch policies.
# Go to: Repos > Branches > Branch Policies > Build Validation to add this pipeline.

parameters:
- name: pullRequestId
  displayName: 'Pull Request ID (for manual runs only)'
  type: string
  default: ''

pool:
  name: '<value>'

variables:
- group: 'PullRequestAgentSecrets' # Contains provider secrets (ANTHROPIC_API_KEY or Foundry vars)
- name: resolvedPullRequestId
  ${{ if ne(parameters.pullRequestId, '') }}:
    value: ${{ parameters.pullRequestId }}
  ${{ else }}:
    value: $(System.PullRequest.PullRequestId)

stages:
  - stage: Build
    displayName: 'Run Pull Request Code Review Agent'
    jobs:
      - job: PullRequestReview
        displayName: 'Run Pull Request Code Review Agent'
        steps:
        - bash: |
            set -e
            mkdir -p "$(Build.ArtifactStagingDirectory)/output/review" || exit 1
            chmod -R 777 "$(Build.ArtifactStagingDirectory)/output"
            docker rm -f pr-agent-container 2>/dev/null || true
            exit 0
          displayName: 'Prepare environment'

        - task: Docker@2
          displayName: 'Run Pull Request Review'
          # === Provider Configuration (choose ONE) ===
          # Option A: Direct Anthropic API
          #   ANTHROPIC_API_KEY: $(ANTHROPIC_API_KEY)
          # Option B: Microsoft Foundry (API key auth)
          #   CLAUDE_CODE_USE_FOUNDRY:1
          #   ANTHROPIC_FOUNDRY_RESOURCE: $(ANTHROPIC_FOUNDRY_RESOURCE)
          #   ANTHROPIC_FOUNDRY_API_KEY: $(ANTHROPIC_FOUNDRY_API_KEY)
          # Option B alt: Microsoft Foundry (Entra ID auth — no API key)
          #   CLAUDE_CODE_USE_FOUNDRY:1
          #   ANTHROPIC_FOUNDRY_RESOURCE: $(ANTHROPIC_FOUNDRY_RESOURCE)
          # =============================================
          env:
            ANTHROPIC_API_KEY: $(ANTHROPIC_API_KEY)
            ADO_AUTH_TOKEN: $(System.AccessToken)
            CONTEXT7_API_KEY: $(CONTEXT7_API_KEY)
          inputs:
            containerRegistry: $(DOCKER_SERVICECONNECTION_NAME)
            command: 'run'
            arguments: >-
              --rm
              --name pr-agent-container
              -v $(Build.SourcesDirectory):/sources
              -v $(Build.ArtifactStagingDirectory)/output:/output
              -e ANTHROPIC_API_KEY=$(ANTHROPIC_API_KEY)
              -e ADO_AUTH_TOKEN=$(System.AccessToken)
              -e CONTEXT7_API_KEY=$(CONTEXT7_API_KEY)
              $(ACR_NAME).azurecr.io/ado/pullrequestagent:latest
              --pull-request-id $(resolvedPullRequestId)
              --organization-name $(ADO_ORGANIZATION_NAME)
              --project-name "$(System.TeamProject)"
              --repository-name "$(Build.Repository.Name)"
              --model $(MODEL_NAME)
              --sources-directory /sources
              --output-directory /output

        - bash: docker run --rm -v "$(Build.ArtifactStagingDirectory)/output:/output" alpine chmod -R a+rw /output
          displayName: 'Fix output file permissions'

        - task: PublishPipelineArtifact@1
          displayName: 'Publish review artifact'
          inputs:
            targetPath: '$(Build.ArtifactStagingDirectory)/output'
            artifact: 'PullRequestReview'

        - powershell: |
            $uri = "$(System.CollectionUri)$(System.TeamProject)/_apis/git/repositories/$(Build.Repository.Name)/pullRequests/$(resolvedPullRequestId)/threads?api-version=7.1"
            $headers = @{
              Authorization  = "Bearer $(System.AccessToken)"
              'Content-Type' = "application/json"
            }

            # Post the summary (or full review if no summary exists) as the first comment
            $summaryFile = "$(Build.ArtifactStagingDirectory)/output/review/code_review_summary.md"
            $fullFile = "$(Build.ArtifactStagingDirectory)/output/review/code_review.md"

            if (Test-Path $summaryFile) {
              $summaryContent = Get-Content -Path $summaryFile -Raw
              $body = @{
                comments = @(@{ parentCommentId = 0; content = $summaryContent; commentType = 1 })
                status = 1
              } | ConvertTo-Json -Depth 3
              Invoke-RestMethod -Uri $uri -Method Post -Headers $headers -Body ([System.Text.Encoding]::UTF8.GetBytes($body)) -ContentType "application/json"
              Write-Host "Posted summary review comment"
            }

            if (Test-Path $fullFile) {
              $fullContent = Get-Content -Path $fullFile -Raw
              $body = @{
                comments = @(@{ parentCommentId = 0; content = $fullContent; commentType = 1 })
                status = 1
              } | ConvertTo-Json -Depth 3
              Invoke-RestMethod -Uri $uri -Method Post -Headers $headers -Body ([System.Text.Encoding]::UTF8.GetBytes($body)) -ContentType "application/json"
              Write-Host "Posted full review comment"
            }
          displayName: 'Post review as PR comments'
